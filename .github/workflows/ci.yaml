name: CI
on: 
  push:
   paths-ignore:
     - 'k8s/manifests/**'
    
env:
  IMAGE_TAG: ${{ github.sha }}
  DOCKER_HUB_USERNAME: malefstorm1994
  DOCKER_HUB_REPO: demoapp
  K8S_DEPLOYMENT_PATH: 'k8s/manifests/deployment.yaml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD}}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME}}/${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,format=short # Adds the short commit SHA tag (default length 7)
            type=raw,value=latest,priority=70 # Adds "latest" tag


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Update image tag
        run: |
          sed -i "s|image: .*|image: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ env.IMAGE_TAG }}|g" ${{ env.K8S_DEPLOYMENT_PATH }}
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Automated update for trigger AgroCD"
          commit_user_name: "ArgoCD"
          commit_user_email: "vakfuder@gmail.com"
        


