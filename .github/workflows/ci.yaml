name: CI
on: push
    
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: malefstorm1994
          

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: my-docker-username/my-image-name # Replace with your image name
          tags: |
            type=sha,format=long # Adds the full commit SHA tag
            type=sha,format=short # Adds the short commit SHA tag (default length 7)
            type=raw,value=latest,priority=70 # Adds "latest" tag


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./k8s/app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}