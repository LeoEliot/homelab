global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'webhook_receiver'

receivers:
- name: 'webhook_receiver'
  webhook_configs:
    - url: 'http://localhost:5001/webhook' # Replace with your actual receiver URL (e.g., Slack, PagerDuty)
