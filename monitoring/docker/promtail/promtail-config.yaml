server:
  http_listen_port: 9080
  grpc_listen_port: 9095

positions:
  # Promtail keeps track of where it last read logs to avoid sending duplicates after a restart
  filename: /tmp/positions.yaml

clients:
  # The URL for the Loki instance (service name "loki" within the Docker network)
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    # This configuration uses the docker-specific service discovery
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        # Optionally, you can filter which containers to scrape here
        # refresh_interval: 15s
    relabel_configs:
      # These relabelings extract useful labels from the Docker metadata
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: log_stream
      # This relabeling is crucial to link the discovered container path to the actual log file path
      - source_labels: ['__meta_docker_container_log_path']
        regex: '(.*)'
        target_label: __path__
